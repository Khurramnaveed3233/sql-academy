<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SQL Academy | Professional Data Analytics Training</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">SQL Academy Pro</div>
        <div class="progress-bar">Progress: <span id="progressText">0%</span></div>
    </nav>

    <div class="main-container">
        <aside class="sidebar" id="sidebar">
            </aside>

        <main class="content-area">
            <header class="topic-header">
                <h2 id="topicTitle">Select a topic to start</h2>
            </header>

            <nav class="content-tabs">
                <button class="tab-btn active" data-tab="explanation">Theory</button>
                <button class="tab-btn" data-tab="syntax">Syntax</button>
                <button class="tab-btn" data-tab="examples">Analytics Examples</button>
            </nav>

            <div class="tab-content">
                <div class="tab-pane active" id="explanation-tab">
                    <p id="explanationText"></p>
                    <div class="urdu-note" id="urduExplanation"></div>
                </div>
                </div>
        </main>
    </div>
    <script src="topics_content.js"></script>
    <script src="script.js"></script>
</body>
</html>
